<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Téléchargement</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .download-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            border-left: 5px solid #667eea;
            transition: transform 0.3s ease;
        }
        .download-card:hover {
            transform: translateX(10px);
        }
        .download-card h2 {
            color: #667eea;
            margin-top: 0;
        }
        .download-card p {
            color: #666;
            margin-bottom: 15px;
        }
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .platform-icon {
            font-size: 24px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 My Book - Téléchargement</h1>
        
        <div class="download-card">
            <h2><span class="platform-icon">🤖</span> Android</h2>
            <p>Version 1.0.0 - APK (68.6 MB)</p>
            <a href="https://github.com/Deogratiasdev/app/raw/main/releases/MyBook.apk" download class="download-btn">Télécharger APK</a>
        </div>
        
        <div class="download-card">
            <h2><span class="platform-icon">🪟</span> Windows</h2>
            <p>Version 1.0.0 - Installateur (36.2 MB)</p>
            <a href="https://github.com/Deogratiasdev/app/raw/main/releases/MyBook_Setup.exe" download class="download-btn">Télécharger Installateur</a>
        </div>
        
        <p style="text-align: center; color: #999; margin-top: 30px;">
            © 2026 My Book - HOUNNOU Déo-Gratias
        </p>
    </div>
</body>
</html>
